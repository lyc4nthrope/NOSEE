global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'nosee'
    environment: 'production'

# Las credenciales se inyectan en tiempo de ejecución desde variables de entorno.
# Ver start.sh — sustituye REMOTE_WRITE_URL, REMOTE_WRITE_USERNAME, REMOTE_WRITE_PASSWORD
# antes de arrancar Prometheus.
remote_write:
  - url: REMOTE_WRITE_URL
    basic_auth:
      username: "REMOTE_WRITE_USERNAME"
      password: "REMOTE_WRITE_PASSWORD"
    queue_config:
      max_samples_per_send: 1000
      max_shards: 5

scrape_configs:
  - job_name: 'nosee-app'
    scheme: https
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true
    static_configs:
      - targets: ['lyc4nthrope-nosee-metrics.hf.space']
